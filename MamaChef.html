<head>

<title>Mama Chef</title>
<style>
:root{--red:#c0392b;--redL:#e74c3c;--green:#27ae60;--blue:#2980b9;--orange:#e67e22;--purple:#8e44ad;--bg:#fdf6ee;--card:#fff;--text:#3a2a1a;--muted:#999;--border:#f0ebe4;--chicken:#d4a017;--fish:#1e88e5;--veggie:#43a047;--meat:#8d3b2b}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;font-size:14px}button{font-family:inherit;cursor:pointer}
.header{background:linear-gradient(135deg,var(--red),var(--redL));padding:14px 16px 0;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{color:#fff;font-size:20px;font-weight:800;letter-spacing:1px}.mama{font-size:36px}
.sync-ind{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}
.tabs{display:flex;margin-top:8px}.tab{flex:1;padding:10px 0;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;text-align:center;transition:.2s}.tab.active{color:#fff;border-bottom-color:#fff}
.page{display:none;padding:10px}.page.show{display:block}
.card{background:var(--card);border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.card-head{display:flex;align-items:center;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-wrap:wrap;gap:4px}
.arrow{font-size:16px;color:#bbb;margin-left:6px;transition:transform .3s}.arrow.open{transform:rotate(180deg)}
.card-body{display:none;padding:0 14px 14px}.card-body.show{display:block}
.ck{width:24px;height:24px;border:2.5px solid #ccc;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:10px;transition:.2s;cursor:pointer}
.ck.on{background:var(--green);border-color:var(--green)}.ck.on::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.done-card{opacity:.55}.done-card .m-name{text-decoration:line-through;color:#aaa}
.m-name{font-weight:700;font-size:14px;flex:1;min-width:0}.m-time{font-size:11px;color:var(--muted);margin-left:6px;white-space:nowrap}
.cat-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;white-space:nowrap}
.cat-Chicken{background:var(--chicken)}.cat-Fish{background:var(--fish)}.cat-Veggie{background:var(--veggie)}.cat-Meat{background:var(--meat)}
.stitle{font-weight:700;font-size:12px;color:var(--red);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);padding-bottom:3px}
.ing{font-size:13px;line-height:1.5;padding:3px 0}
.stp{display:flex;align-items:flex-start;padding:6px 0}.stp-n{background:var(--red);color:#fff;min-width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-right:8px;margin-top:1px}.stp-t{font-size:13px;line-height:1.45}
.mrow{display:flex;gap:4px;margin:8px 0}.mbox{flex:1;background:var(--bg);border-radius:8px;padding:8px 4px;text-align:center}.mbox .v{font-size:16px;font-weight:800}.mbox .l{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}.pill{background:#f0ebe4;border-radius:6px;padding:3px 7px;font-size:10px;color:#666}.pill b{color:var(--text)}
/* Planner */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px}
.week-nav button{background:var(--card);border:1px solid #ddd;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700}
.week-nav .wn-title{text-align:center;flex:1}
.week-nav .wn-title .wn-label{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700}
.week-nav .wn-title .wn-dates{font-size:14px;font-weight:700}
.week-dots{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.week-dot{width:10px;height:10px;border-radius:50%;background:#ddd;cursor:pointer;transition:.2s}
.week-dot.active{background:var(--red);transform:scale(1.3)}
.week-dot.has-meals{background:var(--green)}
.week-dot.active.has-meals{background:var(--red)}
.plan-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.plan-cell{background:var(--card);border-radius:10px;padding:6px 4px;min-height:90px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;transition:border-color .2s;position:relative}
.plan-cell.active{border-color:var(--red)}.plan-cell.today{border-color:var(--blue)}.plan-cell.past{opacity:.5}
.plan-cell .pc-day{font-size:9px;font-weight:700;color:var(--red);text-transform:uppercase;text-align:center}
.plan-cell .pc-date{font-size:16px;font-weight:800;color:var(--text);text-align:center;margin:1px 0}
.plan-cell .pc-meals{margin-top:3px}
.plan-cell .pc-meal{font-size:8px;background:var(--bg);border-radius:3px;padding:2px 3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.plan-cell .pc-meal.cat-Chicken{border-left:3px solid var(--chicken)}.plan-cell .pc-meal.cat-Fish{border-left:3px solid var(--fish)}
.plan-cell .pc-meal.cat-Veggie{border-left:3px solid var(--veggie)}.plan-cell .pc-meal.cat-Meat{border-left:3px solid var(--meat)}
.plan-cell .pc-empty{font-size:18px;color:#ddd;text-align:center;margin-top:6px}
.plan-editor{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:10px}
.plan-editor h3{font-size:14px;margin-bottom:8px}
.plan-slot{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}.plan-slot:last-child{border-bottom:none}
.plan-slot select{flex:1;border:1px solid #ddd;border-radius:8px;padding:7px 8px;font-size:13px;background:#fff;color:var(--text)}
.plan-slot .rm{width:28px;height:28px;border:none;background:#eee;color:#999;border-radius:7px;margin-left:6px;font-size:16px;display:flex;align-items:center;justify-content:center}
.add-slot{background:none;border:1px dashed #ccc;color:var(--muted);padding:6px;border-radius:8px;width:100%;font-size:12px;cursor:pointer;margin-top:4px}
.deploy-btn{background:var(--green);color:#fff;border:none;padding:12px;border-radius:10px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.deploy-btn.current{background:var(--blue)}
.alert{padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:8px}
.alert-warn{background:#fff3e0;color:#e65100;border:1px solid #ffcc02}.alert-good{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}.alert-bad{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.group-hdr{display:flex;align-items:center;gap:8px;margin:14px 0 6px;padding:8px 12px;border-radius:10px;font-weight:700;font-size:13px;color:#fff}
.group-Chicken{background:var(--chicken)}.group-Fish{background:var(--fish)}.group-Veggie{background:var(--veggie)}.group-Meat{background:var(--meat)}

.cal-nav button{background:var(--card);border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px}
.cal-nav .cal-title{font-weight:700;font-size:15px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px}
.cal-cell{background:var(--card);border-radius:6px;min-height:44px;padding:3px;cursor:pointer;border:2px solid transparent}
.cal-cell.today{border-color:var(--red)}.cal-cell.has-data{background:#e8f8f0}.cal-cell.selected{border-color:var(--blue)}.cal-cell.empty{background:transparent}
.cal-cell .cd{font-size:11px;font-weight:700}.cal-cell .cc{font-size:8px;color:var(--green);font-weight:700;margin-top:1px}
.cal-detail{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.cal-detail h3{font-size:14px;margin-bottom:8px}
.cal-meal-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}.cal-meal-item:last-child{border-bottom:none}
.fam-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}

.fam-chip.active{border-color:var(--red);background:#fde8e5;color:var(--red)}.fam-add{border:2px dashed #ccc;color:var(--muted)}

.fam-input button{padding:8px 14px;border:none;background:var(--red);color:#fff;border-radius:8px;font-size:13px;font-weight:600}
.avg-row{display:flex;gap:4px;margin:8px 0}.avg-b{flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
.avg-b .v{font-size:15px;font-weight:800}.avg-b .l{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.info{font-size:11px;color:var(--muted);text-align:center;padding:8px}
.btn-sm{background:var(--card);border:1px solid #ddd;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600}
.section-label{font-weight:700;font-size:13px;color:var(--red);margin:10px 0 6px;text-transform:uppercase;letter-spacing:.4px}
.search-box{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:10px;background:var(--card)}
.cat-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.cat-f{padding:5px 10px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:var(--muted)}
.cat-f.active{border-color:var(--red);background:#fde8e5;color:var(--red)}
.import-box{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.import-box h3{font-size:14px;margin-bottom:8px}
.import-row{display:flex;gap:6px}.import-row input{flex:1;padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px}
.import-btn{padding:9px 16px;border:none;background:var(--red);color:#fff;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap}.import-btn:disabled{opacity:.5}
.import-status{font-size:12px;margin-top:8px;padding:8px;border-radius:8px}
.import-status.loading{background:#fff8e1;color:#f57f17}.import-status.error{background:#fce4ec;color:#c62828}
.import-preview{background:var(--bg);border-radius:10px;padding:12px;margin-top:8px}.import-preview h4{font-size:13px;margin-bottom:6px}
.import-actions{display:flex;gap:8px;margin-top:10px}.import-actions button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700}
.import-save{background:var(--green);color:#fff}.import-discard{background:#eee;color:#666}
.bulk-area{width:100%;min-height:70px;padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;resize:vertical}
.bulk-item{font-size:11px;padding:3px 0;display:flex;align-items:center;gap:6px}
@media(max-width:500px){.plan-grid{gap:3px}.plan-cell{padding:4px 2px;min-height:75px}.plan-cell .pc-date{font-size:14px}.plan-cell .pc-meal{font-size:7px}}
</style>
</head>

// ===== HELPERS =====
function monOfWeek(offset){const n=new Date();const d=(n.getDay()+6)%7;const m=new Date(n);m.setDate(n.getDate()-d+(offset*7));return m}
function weekDates(offset){const m=monOfWeek(offset);return DAYS.map((_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d})}
function weekKey(offset){const m=monOfWeek(offset);return m.getFullYear()+'-W'+String(Math.ceil(((m-new Date(m.getFullYear(),0,1))/86400000+new Date(m.getFullYear(),0,1).getDay()+1)/7)).padStart(2,'0')}
function fmtDateRange(offset){const d=weekDates(offset);return d[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+d[6].toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function weekLabel(offset){if(offset===0)return'This Week';if(offset===1)return'Next Week';if(offset===-1)return'Last Week';return`Week +${offset}`}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

let loaded=false;
function allR(){return[...B,...S.imported.map((r,i)=>({...r,id:1000+i}))]}
function getWeekPlan(offset){const k=weekKey(offset);if(!S.weeks[k])S.weeks[k]=DAYS.map(()=>[null]);return S.weeks[k]}
function setWeekPlan(offset,data){S.weeks[weekKey(offset)]=data}

}

// ===== ANALYSIS =====
function analyze(wd){
  const R=allR(),alerts=[],groups={Chicken:0,Fish:0,Veggie:0,Meat:0},planned=[];
  (wd||[]).forEach((dm,di)=>(dm||[]).forEach(rid=>{if(rid!==null){const r=R.find(x=>x.id===rid);if(r){planned.push(r);if(groups[r.cat]!==undefined)groups[r.cat]++}}}));
  if(!planned.length)return{alerts,planned,groups};
  const catDays={};(wd||[]).forEach((dm,di)=>(dm||[]).forEach(rid=>{if(rid===null)return;const r=R.find(x=>x.id===rid);if(!r)return;if(!catDays[r.cat])catDays[r.cat]=[];catDays[r.cat].push(DAYF[di])}));
  ['Chicken','Meat','Fish'].forEach(cat=>{if((catDays[cat]||[]).length>=3)alerts.push({type:'warn',text:`${cat} appears ${catDays[cat].length}× this week`})});
  const mc={};planned.forEach(r=>{mc[r.meal]=(mc[r.meal]||0)+1});
  Object.entries(mc).forEach(([m,c])=>{if(c>1)alerts.push({type:'warn',text:`"${m}" is repeated ${c}×`})});
  if(groups.Veggie<2)alerts.push({type:'bad',text:`Only ${groups.Veggie} veggie meal${groups.Veggie===1?'':'s'} — aim for 2+`});
  else alerts.push({type:'good',text:`${groups.Veggie} veggie meals ✓`});
  if(groups.Fish===0)alerts.push({type:'warn',text:'No fish this week'});
  return{alerts,planned,groups};
}

  const el=document.getElementById('p-meals');const R=allR();const wp=getWeekPlan(0);const dates=weekDates(0);const today=new Date();

        <div class="mbox"><div class="v" style="color:var(--blue)">${r.pro}g</div><div class="l">Pro</div></div>

        <div class="stitle">Ingredients</div>`;r.ing.forEach(i=>{h+=`<div class="ing">• ${i}</div>`});
      h+=`<div class="stitle">Method</div>`;r.stp.forEach((s,j)=>{h+=`<div class="stp"><div class="stp-n">${j+1}</div><div class="stp-t">${s}</div></div>`});
      h+='</div></div>';
    });
  });
  const eaten=[];wp.forEach((dm,di)=>(dm||[]).forEach((rid,mi)=>{if(rid!==null&&S.done[di+'-'+mi]){const r=R.find(x=>x.id===rid);if(r)eaten.push(r)}}));
  if(eaten.length){const t={cal:0,pro:0,carb:0,fat:0};eaten.forEach(r=>{t.cal+=r.cal;t.pro+=r.pro;t.carb+=r.carb;t.fat+=r.fat});
    h+=`<div class="card" style="padding:14px;margin-top:12px"><div class="section-label" style="margin-top:0">Eaten (${eaten.length})</div>
    <div class="avg-row"><div class="avg-b"><div class="v" style="color:var(--redL)">${t.cal}</div><div class="l">Cal/person</div></div>
    <div class="avg-b"><div class="v">${t.cal*S.family.length}</div><div class="l">Family</div></div></div></div>`}

}
window.tMO=k=>{S._o=S._o===k?null:k;renderMeals()};
window.tMD=k=>{S.done[k]=!S.done[k];const dk=todayKey(),R=allR(),wp=getWeekPlan(0),eaten=[];
  wp.forEach((dm,di)=>(dm||[]).forEach((rid,mi)=>{if(rid!==null&&S.done[di+'-'+mi]){const r=R.find(x=>x.id===rid);if(r)eaten.push(r)}}));
  const t={cal:0,pro:0,carb:0,fat:0,fiber:0,meals:[]};eaten.forEach(r=>{t.cal+=r.cal;t.pro+=r.pro;t.carb+=r.carb;t.fat+=r.fat;t.fiber+=r.fiber;t.meals.push(r.meal)});
  t.family=S.family.length;S.calData[dk]=t;saveState();renderMeals()};

// ===== PLAN =====
function renderPlan(){
  const el=document.getElementById('p-plan');const R=allR();const off=S.planWeekOffset;const dates=weekDates(off);const today=new Date();
  const wp=getWeekPlan(off);const a=analyze(wp);
  let h='<div class="section-label">Family</div><div class="fam-row">';
  S.family.forEach((f,i)=>{h+=`<div class="fam-chip active" onclick="rmFam(${i})">${f} ✕</div>`});
  h+=`<div class="fam-chip fam-add" onclick="document.getElementById('fi').classList.toggle('show')">+ Add</div></div>`;
  h+=`<div class="fam-input" id="fi"><input placeholder="Name" id="fn"><button onclick="addFam()">Add</button></div>`;

  h+=`<div class="week-nav"><button onclick="navWeek(-1)" ${off<=0?'disabled':''}>◀</button>
  <div class="wn-title"><div class="wn-label">${weekLabel(off)}</div><div class="wn-dates">${fmtDateRange(off)}</div></div>
  <button onclick="navWeek(1)" ${off>=3?'disabled':''}>▶</button></div>`;
  // Week dots
  h+='<div class="week-dots">';for(let w=0;w<=3;w++){const wk=getWeekPlan(w);const has=wk.some(d=>d.some(r=>r!==null));h+=`<div class="week-dot${w===off?' active':''}${has?' has-meals':''}" onclick="jumpWeek(${w})"></div>`}h+='</div>';
  // Alerts
  if(a.planned.length){a.alerts.forEach(al=>{h+=`<div class="alert alert-${al.type}"><span>${al.type==='warn'?'⚠️':al.type==='bad'?'❌':'✅'}</span><span>${al.text}</span></div>`})}
  // 7-day grid
  h+='<div class="plan-grid">';
  dates.forEach((d,i)=>{
    const isToday=d.toDateString()===today.toDateString();const isActive=S.planSel===i;
    const isPast=d<new Date(today.getFullYear(),today.getMonth(),today.getDate())&&off===0;
    const slots=wp[i]||[null];const meals=slots.map(rid=>{if(rid===null)return null;return R.find(x=>x.id===rid)}).filter(Boolean);
    h+=`<div class="plan-cell${isActive?' active':''}${isToday?' today':''}${isPast?' past':''}" onclick="selPlan(${i})">
      <div class="pc-day">${DAYS[i]}</div><div class="pc-date">${d.getDate()}</div><div class="pc-meals">`;
    if(meals.length)meals.forEach(m=>{h+=`<span class="pc-meal cat-${m.cat}">${m.meal}</span>`});else h+=`<div class="pc-empty">+</div>`;
    h+=`</div></div>`;
  });h+='</div>';
  // Group counts
  h+='<div class="mrow">';GROUPS.forEach(g=>{h+=`<div class="mbox" style="border-left:3px solid ${g.c}"><div class="v">${a.groups[g.key]||0}</div><div class="l">${g.key}</div></div>`});h+='</div>';
  // Editor
  if(S.planSel!==null){
    const di=S.planSel;const d=dates[di];
    h+=`<div class="plan-editor"><h3>${DAYF[di]} ${d.getDate()}/${d.getMonth()+1}</h3>`;
    const slots=wp[di]||[null];
    const grouped={};GROUPS.forEach(g=>{grouped[g.key]=R.filter(r=>r.cat===g.key)});
    slots.forEach((rid,si)=>{
      h+=`<div class="plan-slot"><select onchange="setPS(${di},${si},this.value)"><option value="">— Pick a meal —</option>`;
      GROUPS.forEach(g=>{h+=`<optgroup label="${g.label}">`;grouped[g.key].forEach(r=>{h+=`<option value="${r.id}"${rid===r.id?' selected':''}>${r.meal} (${r.cal}cal)</option>`});h+='</optgroup>'});
      h+=`</select><div class="rm" onclick="rmS(${di},${si})">✕</div></div>`;
    });
    h+=`<button class="add-slot" onclick="addS(${di})">+ Add meal</button></div>`;
  }else h+='<div class="info">Tap a day to add meals</div>';
  // Totals
  let tc=0,mc=0;wp.forEach(d=>(d||[]).forEach(rid=>{if(rid!==null){const r=R.find(x=>x.id===rid);if(r){tc+=r.cal;mc++}}}));
  if(mc)h+=`<div class="card" style="padding:12px;text-align:center"><b>${mc} meals</b> · ~${tc} cal/person · ~${tc*S.family.length} family</div>`;
  // Copy week buttons
  if(off>0)h+=`<div style="display:flex;gap:8px;margin-top:8px"><button class="btn-sm" style="flex:1" onclick="copyFrom(${off-1})">📋 Copy from ${weekLabel(off-1)}</button></div>`;
  if(off<3)h+=`<div style="margin-top:6px"><button class="btn-sm" style="width:100%" onclick="copyTo(${off+1})">📋 Copy to ${weekLabel(off+1)}</button></div>`;
  // Clear
  h+=`<div style="margin-top:8px;text-align:center"><button class="btn-sm" style="color:var(--redL)" onclick="if(confirm('Clear this week?')){setWeekPlan(${off},DAYS.map(()=>[null]));S.planSel=null;saveState();renderPlan()}">Clear Week</button></div>`;
  el.innerHTML=h;
}
window.navWeek=d=>{S.planWeekOffset=Math.max(0,Math.min(3,S.planWeekOffset+d));S.planSel=null;saveState();renderPlan()};
window.jumpWeek=w=>{S.planWeekOffset=w;S.planSel=null;saveState();renderPlan()};
window.selPlan=i=>{S.planSel=S.planSel===i?null:i;renderPlan()};
window.addFam=()=>{const n=document.getElementById('fn').value.trim();if(n){S.family.push(n);saveState();renderPlan()}};
window.rmFam=i=>{if(S.family.length>1){S.family.splice(i,1);saveState();renderPlan()}};
window.setPS=(di,si,v)=>{const wp=getWeekPlan(S.planWeekOffset);wp[di][si]=v===''?null:parseInt(v);setWeekPlan(S.planWeekOffset,wp);saveState();renderPlan()};
window.addS=di=>{const wp=getWeekPlan(S.planWeekOffset);wp[di].push(null);setWeekPlan(S.planWeekOffset,wp);saveState();renderPlan()};
window.rmS=(di,si)=>{const wp=getWeekPlan(S.planWeekOffset);if(wp[di].length>1){wp[di].splice(si,1);setWeekPlan(S.planWeekOffset,wp);saveState();renderPlan()}};
window.copyFrom=src=>{const d=getWeekPlan(src);setWeekPlan(S.planWeekOffset,d.map(x=>[...x]));saveState();renderPlan()};
window.copyTo=dst=>{const d=getWeekPlan(S.planWeekOffset);setWeekPlan(dst,d.map(x=>[...x]));saveState();renderPlan()};

  h+='<div class="cat-filters">';CATS.forEach(c=>{h+=`<div class="cat-f ${S.cat===c?'active':''}" onclick="S.cat='${c}';renderRecipes()">${c}</div>`});h+='</div>';
  const q=(S.search||'').toLowerCase();
  const filt=R.filter(r=>{if(S.cat==='Imported'&&r.id<1000)return false;if(S.cat!=='All'&&S.cat!=='Imported'&&r.cat!==S.cat)return false;if(q&&!r.meal.toLowerCase().includes(q))return false;return true});
  if(S.cat==='All'){GROUPS.forEach(g=>{const gr=filt.filter(r=>r.cat===g.key);if(!gr.length)return;h+=`<div class="group-hdr group-${g.key}">${g.label} (${gr.length})</div>`;gr.forEach(r=>{h+=rCard(r)})})}
  else filt.forEach(r=>{h+=rCard(r)});
  if(!filt.length)h+='<div class="info">No recipes match</div>';
  h+=`<div class="info">${R.length} recipes (${S.imported.length} imported)</div>`;el.innerHTML=h;
}
function rCard(r){const imp=r.id>=1000;let h=`<div class="card"><div class="card-head" onclick="tRO(${r.id})"><span class="m-name">${imp?'★ ':''}${r.meal}</span><span class="cat-tag cat-${r.cat}">${r.cat}</span><span class="m-time">${r.cal}cal</span><span class="arrow ${S._ro===r.id?'open':''}">▼</span></div><div class="card-body ${S._ro===r.id?'show':''}"><div class="mrow"><div class="mbox"><div class="v" style="color:var(--redL)">${r.cal}</div><div class="l">Cal</div></div><div class="mbox"><div class="v" style="color:var(--blue)">${r.pro}g</div><div class="l">Pro</div></div><div class="mbox"><div class="v" style="color:var(--orange)">${r.carb}g</div><div class="l">Carb</div></div><div class="mbox"><div class="v" style="color:var(--purple)">${r.fat}g</div><div class="l">Fat</div></div></div><div class="pills"><div class="pill">Fiber <b>${r.fiber}g</b></div><div class="pill">Serves <b>${r.serves}</b></div>${r.source?`<div class="pill">${r.source}</div>`:''}</div><div class="stitle">Ingredients</div>`;r.ing.forEach(i=>{h+=`<div class="ing">• ${i}</div>`});h+=`<div class="stitle">Method</div>`;r.stp.forEach((s,j)=>{h+=`<div class="stp"><div class="stp-n">${j+1}</div><div class="stp-t">${s}</div></div>`});if(imp)h+=`<div style="margin-top:10px;text-align:right"><button class="btn-sm" style="color:var(--redL)" onclick="event.stopPropagation();delImp(${r.id-1000})">Delete</button></div>`;h+='</div></div>';return h}
window.tRO=id=>{S._ro=S._ro===id?null:id;renderRecipes()};
window.delImp=i=>{if(confirm('Delete?')){S.imported.splice(i,1);saveState();renderRecipes()}};

// ===== IMPORT API (GEMINI) =====
async function getGeminiKey() {
  let key = localStorage.getItem('gemini_api_key');
  if (!key) {
    key = prompt("Please enter your Google Gemini API Key to import recipes.\n(It will be saved locally on your device).");
    if (key) {
      localStorage.setItem('gemini_api_key', key.trim());
    }
  }
  return key;
}

async function parseURL(url){
  const apiKey = await getGeminiKey();
  if (!apiKey) throw new Error("Gemini API key is required to import recipes.");

  const promptText = `Extract the recipe from this URL: ${url}\nRespond ONLY with a valid JSON object matching this exact structure. Estimate macros if they are not provided. The 'cat' field MUST be exactly one of: "Chicken", "Fish", "Veggie", "Meat".\n{"meal":"Recipe Name","cat":"Chicken","time":"30m","serves":4,"cal":400,"pro":20,"carb":40,"fat":15,"fiber":3,"ing":["ingredient 1"],"stp":["step 1"],"source":"website name"}`;

  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: promptText }] }],
      generationConfig: { responseMimeType: "application/json" } 
    })
  });

  const data = await resp.json();
  
  if (data.error) {
    if (data.error.code === 403) {
      localStorage.removeItem('gemini_api_key'); 
      throw new Error("Invalid API Key. Please try again.");
    }
    throw new Error(data.error.message);
  }

  try {
    const text = data.candidates[0].content.parts[0].text;
    const r = JSON.parse(text);
    
    // Validation and Fallbacks
    if(!r.meal || !r.ing) throw new Error('Incomplete data returned');
    r.cal = parseInt(r.cal) || 400;
    r.pro = parseInt(r.pro) || 20;
    r.carb = parseInt(r.carb) || 40;
    r.fat = parseInt(r.fat) || 15;
    r.fiber = parseInt(r.fiber) || 3;
    r.serves = parseInt(r.serves) || 4;
    if(!['Chicken','Fish','Veggie','Meat'].includes(r.cat)) r.cat = 'Meat';
    
    return r;
  } catch(e) {
    throw new Error('Failed to parse recipe data from the website.');
  }
}

window.doImp=async()=>{const url=document.getElementById('imp-url').value.trim();if(!url)return;impSt={...impSt,loading:true,error:null,preview:null};renderRecipes();try{impSt.preview=await parseURL(url);impSt.loading=false}catch(e){impSt.error=e.message;impSt.loading=false}renderRecipes()};
window.saveImp=()=>{if(impSt.preview){S.imported.push(impSt.preview);impSt.preview=null;saveState();renderRecipes()}};
window.discImp=()=>{impSt.preview=null;renderRecipes()};
window.doBulk=async()=>{const urls=document.getElementById('bulk-urls').value.trim().split('\n').map(u=>u.trim()).filter(u=>u.startsWith('http'));if(!urls.length)return;impSt.bulkRunning=true;impSt.bulkResults=urls.map(u=>({url:u,status:'pending',meal:null}));renderRecipes();for(let i=0;i<urls.length;i++){impSt.bulkResults[i].status='loading';renderRecipes();try{const r=await parseURL(urls[i]);S.imported.push(r);await saveState();impSt.bulkResults[i]={url:urls[i],status:'ok',meal:r.meal}}catch(e){impSt.bulkResults[i]={url:urls[i],status:'err',meal:e.message}}renderRecipes()}impSt.bulkRunning=false;renderRecipes()};

// ===== HISTORY =====
function renderHistory(){const el=document.getElementById('p-history');const y=S.histYear,m=S.histMonth;const mName=new Date(y,m).toLocaleDateString('en-GB',{month:'long',year:'numeric'});const fd=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate(),ts=todayKey();let h=`<div class="cal-nav"><button onclick="calP()">◀</button><div class="cal-title">${mName}</div><button onclick="calN()">▶</button></div><div class="cal-grid">`;['M','T','W','T','F','S','S'].forEach(d=>{h+=`<div class="cal-hdr">${d}</div>`});for(let i=0;i<fd;i++)h+='<div class="cal-cell empty"></div>';for(let d=1;d<=dim;d++){const dk=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const data=S.calData[dk];h+=`<div class="cal-cell${data?' has-data':''}${dk===ts?' today':''}${dk===S.histSel?' selected':''}" onclick="selD('${dk}')"><div class="cd">${d}</div>${data?`<div class="cc">${data.cal}c</div>`:''}</div>`}h+='</div>';if(S.histSel&&S.calData[S.histSel]){const data=S.calData[S.histSel];const dt=new Date(S.histSel+'T12:00:00');h+=`<div class="cal-detail"><h3>${dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short',year:'numeric'})}</h3><div class="avg-row"><div class="avg-b"><div class="v" style="color:var(--redL)">${data.cal}</div><div class="l">Cal</div></div><div class="avg-b"><div class="v" style="color:var(--blue)">${data.pro}g</div><div class="l">Pro</div></div><div class="avg-b"><div class="v" style="color:var(--orange)">${data.carb}g</div><div class="l">Carb</div></div><div class="avg-b"><div class="v" style="color:var(--purple)">${data.fat}g</div><div class="l">Fat</div></div></div>${data.family?`<div style="font-size:12px;color:var(--muted);margin:6px 0">Family of ${data.family} → ${data.cal*data.family} cal</div>`:''}<div class="stitle">Meals</div>`;(data.meals||[]).forEach(m=>{h+=`<div class="cal-meal-item">🍽 ${m}</div>`});h+='</div>'}const mks=Object.keys(S.calData).filter(k=>k.startsWith(y+'-'+String(m+1).padStart(2,'0')));if(mks.length){const mt={cal:0,pro:0,carb:0,fat:0};mks.forEach(k=>{const d=S.calData[k];mt.cal+=d.cal;mt.pro+=d.pro;mt.carb+=d.carb;mt.fat+=d.fat});h+=`<div class="card" style="padding:14px;margin-top:12px"><div class="section-label" style="margin-top:0">Month — ${mks.length} days</div><div class="avg-row"><div class="avg-b"><div class="v">${Math.round(mt.cal/mks.length)}</div><div class="l">Avg Cal</div></div><div class="avg-b"><div class="v">${Math.round(mt.pro/mks.length)}g</div><div class="l">Pro</div></div><div class="avg-b"><div class="v">${Math.round(mt.carb/mks.length)}g</div><div class="l">Carb</div></div><div class="avg-b"><div class="v">${Math.round(mt.fat/mks.length)}g</div><div class="l">Fat</div></div></div></div>`}h+=`<div style="text-align:center;margin-top:14px"><button class="btn-sm" onclick="if(confirm('Clear?')){S.calData={};saveState();renderHistory()}">Clear</button></div>`;el.innerHTML=h}
window.calP=()=>{S.histMonth--;if(S.histMonth<0){S.histMonth=11;S.histYear--}S.histSel=null;saveState();renderHistory()};
window.calN=()=>{S.histMonth++;if(S.histMonth>11){S.histMonth=0;S.histYear++}S.histSel=null;saveState();renderHistory()};
window.selD=dk=>{S.histSel=S.histSel===dk?null:dk;saveState();renderHistory()};
</script>
